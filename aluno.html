<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espaço do Aluno - Mentoria PRO</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/@phosphor-icons/web/src/regular/style.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    
    <div class="app-container flex-col">
        <!-- Header Estudante -->
        <header class="top-header glass-panel" style="margin: 20px 40px; padding: 20px; border-radius:16px;">
            <div class="welcome-section">
                <p style="color:var(--accent-purple); font-weight:600; margin-bottom:4px;">ÁREA EXCLUSIVA</p>
                <h1>Olá, <span id="alunoNomeDisplay">Visitante</span>!</h1>
                <p>Bem-vindo ao seu painel de acompanhamento e acervo de entregas.</p>
            </div>
            <div class="logo">
                <i class="ph ph-graduation-cap"></i>
            </div>
        </header>

        <main class="main-content" style="padding-top: 0;">
            <!-- Painel Próxima Aula -->
            <section class="metrics-grid" style="grid-template-columns: 1fr;" id="nextClassContainer">
                <!-- Injetar próxima mentoria em aberto -->
            </section>

            <!-- Acervo de Aulas -->
            <section class="agenda-section">
                <div class="section-title">
                    <h2 style="display:flex; align-items:center; gap:8px;"><i class="ph ph-video-camera" style="color:var(--accent-blue)"></i> Minhas Aulas Gravadas</h2>
                </div>

                <div class="gallery-grid" id="galleryList">
                    <!-- Cards de videos populadas com aluno.js -->
                </div>
            </section>
        </main>
    </div>

    <script src="aluno.js"></script>
</body>
</html>
